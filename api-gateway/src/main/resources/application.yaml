spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
         routes:
         - id: auth-service
           uri : http://auth-service:1014
           predicates:
             - Path=/auth/**

         - id: patient-service
           uri: http://patient-service:1010
           predicates:
             - Path=/api/patients/**
           filters:
             - RewritePath=/api/patients/(?<segment>.*), /${segment}
             - name: JwtAuth
               args:
                 requiredRole: PATIENT

         - id: doctor-service
           uri: http://doctor-service:1011
           predicates:
             - Path=/api/doctors/**
           filters:
             - RewritePath=/api/doctors/(?<segment>.*), /${segment}
             - name: JwtAuth
               args:
                 requiredRole: DOCTOR

         - id: meeting-service
           uri: http://meeting-service:1012
           predicates:
             - Path=/api/meetings/**
           filters:
             - RewritePath=/api/meetings/(?<segment>.*), /${segment}
             - JwtAuth

         - id: analytics-service
           uri: http://analytics-service:1016
           predicates:
             - Path=/api/analytics/**
           filters:
             - RewritePath=/api/analytics/(?<segment>.*), /analytics/${segment}
             - name: JwtAuth
               args:
                 requiredRole: DOCTOR

server:
  port: 1013

jwt:
  secret: "${JWT_SECRET_KEY}"

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty: DEBUG